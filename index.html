<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>RecuperAI Dashboard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes splash-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      #splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #F3F4F6;
        transition: opacity 0.3s;
      }
      #splash .logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: #0EA5E9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Instrument Sans', system-ui, sans-serif;
        font-weight: 700;
        font-size: 24px;
        color: #FFFFFF;
      }
      #splash .spinner {
        margin-top: 24px;
        width: 24px;
        height: 24px;
        border: 3px solid #E5E7EB;
        border-top-color: #0EA5E9;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
    </style>
    <script>
      (function() {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
          var s = document.createElement("style");
          s.textContent = "#splash{background:#0f172a}#splash .spinner{border-color:#334155;border-top-color:#38BDF8}";
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div class="logo">R</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
